<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Left This Month</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#191919;}
  body{display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
  .tw{background:transparent;padding:1.75rem 1.75rem;width:100%;max-width:400px;}
  .tw-title{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:1.75rem;font-weight:400;}
  .tw-grid{display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;align-items:flex-start;gap:0;margin-bottom:1.75rem;}
  .tw-cell{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .tw-num{font-family:'DM Mono',monospace;font-size:2rem;font-weight:300;color:#e8e6e0;line-height:1;letter-spacing:-0.01em;}
  .tw-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#666;font-weight:400;}
  .tw-sep{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:300;color:#444;padding:0 6px;padding-top:0.1rem;}
  .tw-bar-wrap{height:1.5px;background:#333;border-radius:1px;overflow:hidden;margin-bottom:1rem;}
  .tw-bar{height:100%;background:#b8b2a4;border-radius:1px;transition:width 1s linear;}
  .tw-footer{display:flex;justify-content:space-between;align-items:center;}
  .tw-pct{font-family:'DM Mono',monospace;font-size:10px;color:#666;letter-spacing:0.06em;}
  .tw-month{font-size:10px;color:#555;letter-spacing:0.12em;text-transform:uppercase;}
</style>
</head>
<body>
<div class="tw">
  <div class="tw-title">time left in this month</div>
  <div class="tw-grid">
    <div class="tw-cell"><span class="tw-num" id="d">--</span><span class="tw-label">days</span></div>
    <span class="tw-sep">:</span>
    <div class="tw-cell"><span class="tw-num" id="h">--</span><span class="tw-label">hours</span></div>
    <span class="tw-sep">:</span>
    <div class="tw-cell"><span class="tw-num" id="m">--</span><span class="tw-label">mins</span></div>
    <span class="tw-sep">:</span>
    <div class="tw-cell"><span class="tw-num" id="s">--</span><span class="tw-label">secs</span></div>
  </div>
  <div class="tw-bar-wrap"><div class="tw-bar" id="bar"></div></div>
  <div class="tw-footer">
    <span class="tw-pct" id="pct"></span>
    <span class="tw-month" id="mname"></span>
  </div>
</div>
<script>
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
function pad(n){return String(n).padStart(2,'0');}
function update(){
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth();
  const end=new Date(y,mo+1,1,0,0,0,0);
  const start=new Date(y,mo,1,0,0,0,0);
  const totalMs=end-start;
  const leftMs=end-now;
  const pct=Math.round(((totalMs-leftMs)/totalMs)*100);
  const leftSec=Math.floor(leftMs/1000);
  const d=Math.floor(leftSec/86400);
  const h=Math.floor((leftSec%86400)/3600);
  const m=Math.floor((leftSec%3600)/60);
  const s=leftSec%60;
  document.getElementById('d').textContent=pad(d);
  document.getElementById('h').textContent=pad(h);
  document.getElementById('m').textContent=pad(m);
  document.getElementById('s').textContent=pad(s);
  document.getElementById('bar').style.width=pct+'%';
  document.getElementById('pct').textContent=pct+'% elapsed';
  document.getElementById('mname').textContent=months[mo];
}
update();setInterval(update,1000);
</script>
</body>
</html>
