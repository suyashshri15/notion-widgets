<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #e2ddd5;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .widget {
    width: 100%;
    max-width: 480px;
    background: #1f1f1f;
    border-radius: 10px;
    padding: 28px 24px 32px;
  }

  /* ── Nav Header ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    padding: 4px 8px;
    transition: color 0.2s;
    line-height: 1;
  }
  .nav-btn:hover { color: #e2ddd5; }

  .cal-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 4vw, 22px);
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #e2ddd5;
    text-align: center;
  }

  /* ── Grid ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    row-gap: 4px;
    column-gap: 4px;
  }

  .day-name {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: #e2ddd5;
    padding: 0 0 14px;
  }

  .day {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #2e2e2e;
    border-radius: 5px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: default;
    transition: background 0.15s;
  }

  .day.in-month         { color: #777; }
  .day.past             { color: #363636; }
  .day.future           { color: #9a9590; }

  .day.in-month:not(.today):not(.past):hover {
    background: #262626;
    color: #c8c3bc;
  }

  /* Today — cream filled square */
  .day.today {
    background: #e2ddd5;
    color: #1a1a1a;
    font-weight: 700;
  }


</style>
</head>
<body>
<div class="widget">

  <div class="cal-nav">
    <button class="nav-btn" id="prev-btn">&#8249;</button>
    <div class="cal-title" id="cal-title">—</div>
    <button class="nav-btn" id="next-btn">&#8250;</button>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

</div>

<script>
  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                  'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  const now = new Date();
  let viewYear = now.getFullYear(), viewMonth = now.getMonth();

  function buildCalendar() {
    const todayY = now.getFullYear(), todayM = now.getMonth(), todayD = now.getDate();

    document.getElementById('cal-title').textContent =
      MONTHS[viewMonth] + ' ' + viewYear;

    const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    let html = DAY_NAMES.map(d => `<div class="day-name">${d}</div>`).join('');

    // Prev month filler
    for (let i = firstDay - 1; i >= 0; i--)
      html += `<div class="day"><span>${daysInPrev - i}</span></div>`;

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = d === todayD && viewMonth === todayM && viewYear === todayY;
      const isPast  = !isToday && (viewYear < todayY ||
                      (viewYear === todayY && viewMonth < todayM) ||
                      (viewYear === todayY && viewMonth === todayM && d < todayD));
      const cls = 'day in-month' + (isToday ? ' today' : isPast ? ' past' : ' future');
      // dot shown only on today (mirroring the reference image's indicator)
      html += `<div class="${cls}"><span>${d}</span></div>`;
    }

    // Next month filler
    const trailing = (7 - (firstDay + daysInMonth) % 7) % 7;
    for (let d = 1; d <= trailing; d++)
      html += `<div class="day"><span>${d}</span></div>`;

    document.getElementById('cal-grid').innerHTML = html;
  }

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
    buildCalendar();
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
    buildCalendar();
  });

  buildCalendar();
</script>
</body>
</html>
